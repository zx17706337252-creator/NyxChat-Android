name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK（含 SDK 35 + Build Tools 35.0.0）────────────────────
      # ubuntu-latest 预装 SDK 最高到 34；compileSdk=35 必须显式安装，
      # 否则报 "Failed to find Build Tools revision 35.0.0"。
      - name: Set up Android SDK 35
        uses: android-actions/setup-android@v3

      - name: Install SDK 35 & Build Tools
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" \
            "platform-tools" --sdk_root=$ANDROID_SDK_ROOT
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ── 4. Gradle 缓存 ────────────────────────────────────────────────────
      - name: Cache Gradle wrapper & caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          # v4- 前缀可手动递增来强制缓存失效（应对 Kotlin 增量缓存污染问题）
          key: v4-gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            v4-gradle-${{ runner.os }}-

      # ── 5. 确保 gradlew 可执行 ─────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5b. 清理增量编译缓存 ────────────────────────────────────────────────
      # 防止 Kotlin 增量编译缓存污染：源码已改但编译器看到旧产物
      - name: Clean build artifacts
        run: ./gradlew clean --no-daemon

      # ── 6. Debug APK ──────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Release APK（触发 R8 / ProGuard）─────────────────────────────
      # continue-on-error: false → release 失败会让整个 CI 变红，便于发现问题
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 8. 上传 APK 产物 ──────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
